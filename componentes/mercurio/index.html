<!DOCTYPE html>
<html lang="pt-br">
    <head>

        <!-- Meu CSS e Javascript -->
        <link rel="stylesheet" href="estilo.css" />
        <script src="codigo.js"></script>

    <body>

          </symbol>
          <symbol id="logo-castrotec" viewbox="0 0 300 100">
              <circle cx="40" cy="50" r="35" fill="#0D6EFD"/> <path d="M40 25V35M40 65V75M25 50H35M65 50H75" stroke="white" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 40L48 60M48 40L32 60" stroke="white" stroke-width="6" stroke-linecap="round"/>

              <text x="85" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold">
              Castro<tspan fill="#0D6EFD">TEC</tspan>
              </text>

              <text x="87" y="80" font-family="Arial, sans-serif" font-size="11">
              SOLUÇÕES EM ELETRODOMÉSTICOS
              </text>
          </symbol>
        </svg>

        <!-- Mercurio - Whatsapp no canto inferior direito -->
        <div class="mercurio">
            <a class="mercurio-link">
                <svg class="mercurio-svg">
                  <use xlink:href="#icon-whatsapp"></use>
                </svg>
            </a>
        </div>

        <!-- Saturno - Chamada para Whatsapp -->
        <div class="saturno">
            <a class="saturno-link" >
                <svg class="saturno-svg">
                  <use xlink:href="#icon-whatsapp"></use>
                </svg>
                Falar com especialista
            </a>
        </div>

        <br />
        <div id="logo" class="bg-dark">
            <svg>
              <use xlink:href="#logo-castrotec"></use>
            </svg>
        </div>

    </body>
</html>
