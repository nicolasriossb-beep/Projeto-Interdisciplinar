<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>
            CastroTEC - A Melhor Assistência Técnica em Eletrodomésticos na Zona Sul de São Paulo
        </title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- CSS e Javascript do Bootsrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Meu CSS -->
        <link rel="stylesheet" href="estilo.css" />
    </head>
    <body>
        <!-- Biblioteca de Ícones -->
        <svg xmlns="http://www.w3.org/2000/svg" class="d-none">
          <symbol id="icon-whatsapp" viewBox="0 0 16 16">
              <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
          </symbol>
        </svg>

        <!-- Mercurio - Whatsapp no canto inferior direito -->
        <div class="mercurio">
            <a class="mercurio-link">
                <svg class="mercurio-svg">
                  <use xlink:href="#icon-whatsapp"></use>
                </svg>
            </a>
        </div>


        <!-- Netuno - Barra de Navegação -->
        <nav class="netuno navbar navbar-expand-lg">
            <div class="container-fluid">
                <!-- Logo -->
                <a class="navbar-brand" href="index.html">
                    <img class="netuno-logo" src="logo-castrotec.svg" 
                         alt="CastroTEC - Soluções em Eletrodomésticos">
                </a>

                <!-- Botão toggler para telas menores que lg -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#netuno-nav" aria-controls="netuno-nav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Bloco alvo do toggler -->
                <div class="collapse navbar-collapse" id="netuno-nav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item ms-auto">
                            <a class="nav-link agendar-link">
                                <svg class="agendar-svg">
                                  <use xlink:href="#icon-whatsapp"></use>
                                </svg>
                                Agendar
                            </a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Nossos profissionais</a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Avaliar</a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="ajuda.html">Ajuda</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Atena - bloco principal da página -->
        <main class="atena container-fluid">
            <div class="atena-conteudo container-fluid">

                <!-- Jano - Perguntas e Respostas  -->
                <div id="jano" class="container-fluid">
                    <h1 id="jano-titulo">Perguntas frequentes</h1>
                    <div class="accordion" id="jano-accordion">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" 
                                        data-bs-toggle="collapse" data-bs-target="#jano-collapseOne"
                                        aria-expanded="false" aria-controls="jano-collapseOne">
                                    Aceita pagamento fiado?
                                </button>
                            </h2>
                            <div id="jano-collapseOne" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                                <div class="accordion-body">
                                    Não.
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" 
                                        data-bs-toggle="collapse" data-bs-target="#jano-collapseTwo"
                                        aria-expanded="false" aria-controls="jano-collapseTwo">
                                    Como faço para agendar uma visita técnica?
                                </button>
                            </h2>
                            <div id="jano-collapseTwo" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                                <div class="accordion-body">
                                    Entre em contato pelo Whatsapp.
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" 
                                        data-bs-toggle="collapse" data-bs-target="#jano-collapseThree"
                                        aria-expanded="false" aria-controls="jano-collapseThree">
                                    Como faço para avaliar o serviço?
                                </button>
                            </h2>
                            <div id="jano-collapseThree" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                                <div class="accordion-body">
                                    Escreva uma avaliação no Google.
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" 
                                        data-bs-toggle="collapse" data-bs-target="#jano-collapseFour"
                                        aria-expanded="false" aria-controls="jano-collapseFour">
                                    Como relatar um problema?
                                </button>
                            </h2>
                            <div id="jano-collapseFour" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                                <div class="accordion-body">
                                    Escreva uma reclamação pelo Whatsapp.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>


        <!-- Meu Javascript -->
        <script src="codigo.js"></script>
    </body>
</html>
