<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Barra de navegação</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- CSS e Javascript do Bootsrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Meu CSS e Javascript -->
        <link rel="stylesheet" href="estilo.css" />
        <script src="codigo.js"></script>
    </head>
    <body>
        <!-- Netuno - Barra de Navegação -->
        <nav class="netuno navbar navbar-expand-lg">
            <div class="container-fluid">
                <!-- Logo -->
                <a class="navbar-brand" href="#">
                    <img src="assets/logo-castrotec.svg" alt="CastroTEC" class="netuno-logo img-fluid d-inline-block">
                </a>

                <!-- Botão toggler para telas menores que lg -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#netuno-nav" aria-controls="netuno-nav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Bloco alvo do toggler -->
                <div class="collapse navbar-collapse" id="netuno-nav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Agendar</a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Nossos profissionais</a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Avaliar</a>
                        </li>
                        <li class="nav-item ms-auto">
                            <a class="nav-link" href="#">Ajuda</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Atena - bloco principal da página -->
        <main class="atena container-fluid">
            <div class="atena-conteudo container-fluid">
                <p>
                    Para telas menores que 992 pixels, os elementos colapsam.
                </p>
                <p>
                    A barra de navegação fica sempre visível no topo da página.
                </p>
            </div>
        </main>
    </body>
</html>
