<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CastroTEC - A Melhor Assistência Técnica de Eletrodomésticos na Zona Sul de São Paulo</title>

        <!-- CSS e Javascript do Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Nosso CSS -->
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header class="topbar">
            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <div class="top-buttons">
                <div class="config">
                    <button onclick="toggleMenu()">Configurações ⚙️</button>

                    <div id="btnConfig" class="menu-config hidden">
                        <button onclick="toggleDarkMode()">Alternar tema</button>
                    </div>
                </div>
                <button>
                    <a href="ajuda.html">Ajuda</a>
                </button>
            </div>
        </header>
        <nav class="sidebar">
            <a href="index.html">
                <button>Menu Inicial</button>
            </a>
            <a href="avalie.html">
                <button>Avalie Aqui</button>
            </a>
            <a href="contato.html">
                <button>Busque</button>
            </a>
            <a href="maissobre.html">
                <button>Mais Sobre</button>
            </a>
        </nav>

        <main class="conteudo">

            <div id="jano">
                <h1 id="jano-titulo">Perguntas frequentes</h1>
                <div class="accordion" id="jano-accordion">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" 
                                data-bs-toggle="collapse" data-bs-target="#jano-collapseOne"
                                aria-expanded="false" aria-controls="jano-collapseOne">
                                Aceita pagamento fiado?
                            </button>
                        </h2>
                        <div id="jano-collapseOne" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                            <div class="accordion-body">
                                Não.
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" 
                                data-bs-toggle="collapse" data-bs-target="#jano-collapseTwo"
                                aria-expanded="false" aria-controls="jano-collapseTwo">
                                Como faço para agendar uma visita técnica?
                            </button>
                        </h2>
                        <div id="jano-collapseTwo" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                            <div class="accordion-body">
                                Entre em contato pelo Whatsapp.
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" 
                                data-bs-toggle="collapse" data-bs-target="#jano-collapseThree"
                                aria-expanded="false" aria-controls="jano-collapseThree">
                                Como faço avaliar o serviço?
                            </button>
                        </h2>
                        <div id="jano-collapseThree" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                            <div class="accordion-body">
                                Escreva uma avaliação no Google.
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" 
                                data-bs-toggle="collapse" data-bs-target="#jano-collapseFour"
                                aria-expanded="false" aria-controls="jano-collapseFour">
                                Como relatar um problema?
                            </button>
                        </h2>
                        <div id="jano-collapseFour" class="accordion-collapse collapse" data-bs-parent="#jano-accordion">
                            <div class="accordion-body">
                                Escreva uma reclamação pelo Whatsapp.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <script src="index.js"></script>
    </body>
</html>
